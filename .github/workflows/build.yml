name: Build Windows EXE

# Baut den Windows-Installer (.exe) bei jedem Version-Tag (z.B. v1.0.4) und
# laesst electron-builder das GitHub-Release SELBST veroeffentlichen –
# inkl. korrekter latest.yml fuer electron-updater (Auto-Update).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # Bei Tag-Push: bauen UND als Release veroeffentlichen (latest.yml inklusive).
      - name: Build & Publish (Tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always

      # Manueller Lauf ohne Tag: nur bauen, kein Release.
      - name: Build only (manuell)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build -- --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinanzverwaltungPro-Setup
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap

  # Nach erfolgreichem Tag-Build: alte Releases/Tags aufraeumen (behaelt 2).
  # Laeuft ueber den Tag-Push-Event und damit zuverlaessig bei jedem Release -
  # unabhaengig davon, ob der Entwurf schon freigegeben wurde.
  cleanup:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/cleanup-releases.yml
    permissions:
      contents: write
    with:
      keep: "2"
